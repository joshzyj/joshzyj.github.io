function b64(s){var b=atob(s),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
async function unlock(pass){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey("raw",enc.encode(pass),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:ITERS,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(BLOB));
  var html=new TextDecoder().decode(pt);
  try{sessionStorage.setItem("course_pc",pass);}catch(e){}
  document.open();document.write(html);document.close();
}
document.getElementById("f").addEventListener("submit",function(ev){
  ev.preventDefault();
  var e=document.getElementById("e");e.textContent="";
  unlock(document.getElementById("p").value).catch(function(){
    e.textContent="Wrong passcode — try again.";
    document.getElementById("p").select();
  });
});
try{var saved=sessionStorage.getItem("course_pc");if(saved){unlock(saved).catch(function(){sessionStorage.removeItem("course_pc");});}}catch(e){}
