function b64(s){var b=atob(s),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
async function unlock(pass){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey("raw",enc.encode(pass),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:ITERS,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(BLOB));
  var html=new TextDecoder().decode(pt);
  try{sessionStorage.setItem("course_pc",pass);}catch(e){}
  /* Inject the decrypted DOM into the (already-loaded) document, THEN run its
     scripts, so the viewer's init always sees the content — independent of when
     the passcode was entered. (document.write after load runs head scripts
     before the body exists, which left every section un-partitioned.) */
  var doc=new DOMParser().parseFromString(html,"text/html");
  try{document.title=doc.title||document.title;}catch(e){}
  document.head.innerHTML=doc.head.innerHTML;
  document.body.innerHTML=doc.body.innerHTML;
  var src=doc.getElementsByTagName("script");
  for(var i=0;i<src.length;i++){
    var o=src[i],s=document.createElement("script");
    for(var j=0;j<o.attributes.length;j++){s.setAttribute(o.attributes[j].name,o.attributes[j].value);}
    s.textContent=o.textContent;
    document.body.appendChild(s);
  }
}
